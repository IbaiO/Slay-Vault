services:
  db:
    image: mysql:8.4
    container_name: slay_vault_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: slay_vault
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./slay-vault-api/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  api:
    build:
      context: ./slay-vault-api
      dockerfile: Dockerfile
    container_name: slay_vault_api
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DB_SERVER: db
      DB_USER: root
      DB_PASS: root
      DB_DATABASE: slay_vault
      FIREBASE_PROJECT_ID: slayvault-ab6d2
      FIREBASE_SERVICE_ACCOUNT_PATH: /var/www/html/secrets/firebase-service-account.json
    ports:
      - "8080:80"
    volumes:
      - ./slay-vault-api:/var/www/html/slay-vault-api
      - ./secrets:/var/www/html/secrets:ro

volumes:
  db_data:

